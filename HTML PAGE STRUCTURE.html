<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY FORST WEBSITE </title>
    <style>
        *{
            box-sizing: border-box;
        }
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #eaf0f7;
            color: #253238;
        }
        header{
            background: linear-gradient(120deg, #04aa6d, #04744d);
            color: #fff;
            padding: 60px 20px;
            text-align: center;
        }
        header h1{
            font-size: 56px;
        }
        main{
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 20px ;
        }
        section{
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
        }
        section h2{
            margin-top: 0;
            font-size: 36px;
            color: #04aa6d;
        }
        footer{
            padding: 24px;
            text-align: center;
            background: #e8edf4;
            font-size: 14px;
        }



    </style>
</head>
<body>
    <header>
        <h1>HELLO WORLD! </h1>
        <p> This site is built with HTML CSS. </p>

    </header>
    <main>
        <section>
            <h2>
                About Me 
            </h2>
            <p> I am learning how to code website from scratch. </p>

        </section>
        <section>
            <h2>projects</h2>
            <ul>
                <li>Portfolio landing page </li>
                <li>Product showcase </li>
                <li> Responsive blog layout </li>

            </ul>
        </section>
    </main>
    <footer>
        <p>Built with ❤️ using HTML & CSS. </p>
    </footer>
    
</body>
</html>
